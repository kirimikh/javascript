<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Учебные карточки</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h2>Управление колодой</h2>
    <section>
      <div class="input-group">
        <input type="text" id="frontText" placeholder="Вопрос (лицо)" />
        <input type="text" id="backText" placeholder="Ответ (оборот)" />
        <button id="addBtn">Создать</button>
      </div>

      <div style="margin-bottom: 10px">
        <button id="shuffleBtn">Перемешать колоду</button>
      </div>

      <table id="deckTable">
        <thead>
          <tr>
            <th>Лицо</th>
            <th>Оборот</th>
            <th>Статус</th>
            <th>Действия</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </section>

    <h2>Режим изучения</h2>
    <section id="studySection">
      <div>
        <label>
          <input type="checkbox" id="onlyNewFilter" /> Только невыученные
        </label>
      </div>

      <div class="study-card" id="cardDisplay">Здесь будет карточка</div>

      <div class="controls">
        <button id="prevBtn">Назад</button>
        <span id="posInfo">0 / 0</span>
        <button id="nextBtn">Вперед</button>
      </div>
    </section>

    <script src="main.js"></script>
  </body>
</html>
