<!doctype html>
<html>
  <head>
    <title>Simon Says</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="game-container">
      <h1>Simon Says</h1>
      <div class="stats">
        <p>Level: <span id="current-score">1</span></p>
        <p>Best: <span id="best-score">0</span></p>
      </div>

      <div id="status">Press Start</div>

      <div class="pad">
        <div class="game-btn red" data-index="0"></div>
        <div class="game-btn blue" data-index="1"></div>
        <div class="game-btn green" data-index="2"></div>
        <div class="game-btn yellow" data-index="3"></div>
      </div>

      <button id="start-btn">Start Game</button>
    </div>
    <script src="main.js"></script>
  </body>
</html>
